name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: '0 6 * * 1'   # Haftalık — Pazartesi 06:00 UTC (güvenlik denetimi)

jobs:
  architecture:
    name: "Tier 1 — Architecture Tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Architecture Tests
        run: |
          python -m pytest tests/test_architecture.py \
            -q --tb=short

  integration:
    name: "Tier 2 — Integration Tests"
    runs-on: ubuntu-latest
    needs: architecture
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Integration Tests
        run: |
          python -m pytest tests/test_backtest.py \
            tests/test_signal_alert.py \
            -q --tb=short

  lint:
    name: "Ruff Linter"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install ruff
        run: pip install ruff
      - name: Lint
        run: ruff check src/ tests/ --select E9,F63,F7,F82

  full-regression:
    name: "Tier 3 — Full Regression"
    runs-on: ubuntu-latest
    needs: [architecture, integration, lint]
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Full Test Suite
        run: |
          python -m pytest tests/ \
            -q --tb=short

  security:
    name: "Security — pip-audit"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Audit dependencies
        run: pip-audit --requirement requirements.txt
        continue-on-error: true   # bilgilendirme — CVE bloklamaz (Dependabot takip eder)

  type-check:
    name: "Type Check — mypy"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install mypy
        run: pip install mypy
      - name: Type Check
        run: mypy src/ --config-file pyproject.toml --ignore-missing-imports
        continue-on-error: true   # teknik borç — şimdilik bloklamaz
