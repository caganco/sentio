name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  architecture:
    name: "Tier 1 — Architecture Tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Architecture Tests
        run: |
          python -m pytest tests/test_architecture.py \
            -q --tb=short

  integration:
    name: "Tier 2 — Integration Tests"
    runs-on: ubuntu-latest
    needs: architecture
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Integration Tests
        run: |
          python -m pytest tests/test_backtest.py \
            tests/test_signal_alert.py \
            -q --tb=short

  lint:
    name: "Ruff Linter"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install ruff
        run: pip install ruff
      - name: Lint
        run: ruff check src/ tests/

  full-regression:
    name: "Tier 3 — Full Regression"
    runs-on: ubuntu-latest
    needs: [architecture, integration, lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Full Test Suite
        run: |
          python -m pytest tests/ \
            -q --tb=short
