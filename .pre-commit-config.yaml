# Install both stages with a bare `pre-commit install`. Without this, only the
# pre-commit stage is wired and the commit-msg guard silently never runs.
default_install_hook_types: [pre-commit, commit-msg]

repos:
  - repo: local
    hooks:
      - id: tier1-architecture-tests
        name: "Tier 1 — Architecture Tests"
        entry: python -m pytest tests/test_architecture.py -q --tb=short
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: tier2-integration-tests
        name: "Tier 2 — Integration Tests"
        entry: python -m pytest tests/test_backtest.py tests/test_signal_alert.py -q --tb=short
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: ruff-lint
        name: "Ruff Linter"
        entry: ruff check src/ tests/ --select E9,F63,F7,F82
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: public-hygiene
        name: "Public Hygiene - leak guard (staged diff)"
        entry: python scripts/check_public_hygiene.py
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: public-hygiene-commit-msg
        name: "Public Hygiene - commit message (AI attribution)"
        entry: python scripts/check_public_hygiene.py --commit-msg
        language: system
        pass_filenames: true
        stages: [commit-msg]
