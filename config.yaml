scanner:
  # Momentum kriterleri
  rsi_buy_min: 50
  rsi_buy_max: 65
  rsi_overbought: 80
  rsi_oversold: 35
  volume_surge_threshold: 1.5      # 20-day avg üstü
  momentum_1m_min_pct: 5.0         # 1 aylık min momentum
  ma_periods: [20, 50, 200]

  # Stop-loss kuralları
  stop_loss_pct: 0.07              # %7 max kayıp

  # Pozisyon büyüklüğü
  position_sizing:
    high_conviction_pct: 0.175     # %15-20 portföy
    medium_conviction_pct: 0.075   # %5-10 portföy

  # Sektör limitleri
  max_same_sector: 2
  max_sector_pct: 0.30

macro:
  # Makro sinyal ağırlıkları (Layer 2)
  signals:
    usdtry:  { scale: 0.02, weight: 0.25 }
    vix:     { scale: 0.15, weight: 0.20 }
    brent:   { scale: 0.05, weight: 0.15 }
    gold:    { scale: 0.05, weight: 0.10 }
    sp500:   { scale: 0.05, weight: 0.15 }
    bist100: { scale: 0.05, weight: 0.15 }

agent:
  # Agent token optimization ayarları
  analyst:
    model: "claude-opus-4-6"
    max_tokens: 2000
    # Sadece WATCHLIST filtresinden geçen hisseler gönderilir
    pre_filter: true              # ← OPTİMİZASYON: tüm 60 değil, sinyal verenler
    pre_filter_min_score: 60      # Momentum score < 60 → analyst'a gönderme

  auditor:
    model: "claude-sonnet-4-6"
    max_tokens: 1500
    # Sadece BUY/SELL sinyali olan hisseler gönderilir
    only_flagged: true            # ← OPTİMİZASYON: HOLD'lar audit edilmez

  efficiency:
    model: "claude-sonnet-4-6"
    max_tokens: 1000
    run_frequency: "weekly"       # Günlük değil, haftalık

reporting:
  output_dir: "reports"
  intelligence_dir: "intelligence"
  formats: ["md", "html"]
  # Report optimizasyonu
  include_hold_details: false     # ← OPTİMİZASYON: HOLD pozisyonlar tek satır
  max_watchlist_in_report: 10     # En iyi 10 sinyal (hepsi değil)

scheduler:
  times:
    data_fetch:    "06:00"
    analyst_run:   "08:00"
    auditor_run:   "08:30"
    market_open:   "10:00"
    eod_update:    "18:30"
    efficiency:    "18:45"  # Sadece Cuma